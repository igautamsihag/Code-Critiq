name: Frontend CI Pipeline

on:
    push:
        branches: ["develop", "main"]
    pull_request:
        branches: ["main", "develop"]

jobs:
    lint:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: client

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: client/package-lock.json

            - name: Install Dependencies
              run: npm ci

            - name: Run Lint
              run: npm run lint

    test:
        runs-on: ubuntu-latest
        needs: lint
        defaults:
            run:
                working-directory: client

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: client/package-lock.json

            - name: Install Dependencies
              run: npm ci

            - name: Run Tests
              run: npm test -- --ci

    build:
        runs-on: ubuntu-latest
        needs: test
        defaults:
            run:
                working-directory: client

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: client/package-lock.json

            - name: Install Dependencies
              run: npm ci

            - name: Build
              run: npm run build
